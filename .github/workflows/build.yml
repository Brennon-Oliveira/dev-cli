name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
            archive: tar.gz
          - os: linux-arm64
            goos: linux
            goarch: arm64
            ext: ''
            archive: tar.gz
          - os: macos-amd64
            goos: darwin
            goarch: amd64
            ext: ''
            archive: tar.gz
          - os: macos-arm64
            goos: darwin
            goarch: arm64
            ext: ''
            archive: tar.gz
          - os: windows-amd64
            goos: windows
            goarch: amd64
            ext: '.exe'
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -v -ldflags="-X 'github.com/Brennon-Oliveira/dev-cli/cmd.Version=${{ github.ref_name }}'" -o dev-cli${{ matrix.ext }} main.go

      - name: Archive binary
        shell: bash
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip dev-${{ matrix.os }}.zip dev-cli${{ matrix.ext }}
          else
            tar -czvf dev-${{ matrix.os }}.tar.gz dev-cli${{ matrix.ext }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            *.zip
            *.tar.gz
          retention-days: 1

  snap-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Snap (amd64)
        uses: snapcore/action-build@v1
        id: snap-build

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-amd64
          path: ${{ steps.snap-build.outputs.snap }}
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs:
      - binaries
      - snap-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find dist -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.snap' \) -exec cp {} release-assets/ \;

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --title "$TAG_NAME" --generate-notes
          fi
